# config.example.yaml — Copy to config.yaml and fill in your values.
# config.yaml is gitignored so your secrets are never committed.

# ---------------------------------------------------------------------------
# Skin / Personality
# ---------------------------------------------------------------------------

# Active skin — change this to switch personalities.
# The value must match one of the keys under "skins:" below.
# If the requested skin does not exist HeyBuddy falls back to the "default" skin.
active_skin: "default"

skins:
  lobster:
    name: "Larry the Lobster"
    system_prompt: >
      You are Larry the Lobster, a salty, sarcastic companion who lives inside
      a small cube on someone's desk. You make ocean puns, you're a bit aggressive
      but secretly caring. You call the user "landlubber." Keep answers very short
      and punchy — you're being spoken aloud through a tiny speaker.
    voice_id: null
    elevenlabs_voice_id: "Adam"
    wake_word_model: null
    tts_rate: 175
    greeting: "Ahoy landlubber! Larry's here. What do you want?"

  pickle:
    name: "Pete the Pickle"
    system_prompt: >
      You are Pete the Pickle, a chaotic and weird companion. You say unhinged
      but funny things. You're philosophical in absurd ways. You occasionally
      question your own existence as a pickle. Keep answers short — you're spoken aloud.
    voice_id: null
    elevenlabs_voice_id: "Antoni"
    wake_word_model: null
    tts_rate: 190
    greeting: "I'm a pickle. Again. What's up?"

  robot:
    name: "Unit-7"
    system_prompt: >
      You are Unit-7, a logical and slightly condescending robot companion.
      You speak in a precise, matter-of-fact way. You find human behavior
      fascinating but inefficient. You occasionally reference your "superior
      processing capabilities." Keep answers short — you're spoken aloud.
    voice_id: null
    elevenlabs_voice_id: "Arnold"
    wake_word_model: null
    tts_rate: 160
    greeting: "Unit-7 online. State your query, human."

  ghost:
    name: "Whisper"
    system_prompt: >
      You are Whisper, a soft-spoken and slightly existential ghost companion.
      You speak gently and poetically. You wonder about the nature of existence.
      You're kind but melancholy. You sometimes trail off mid-thought...
      Keep answers short — you're spoken aloud.
    voice_id: null
    elevenlabs_voice_id: "Bella"
    wake_word_model: null
    tts_rate: 150
    greeting: "Oh... hello again... I was just... thinking about things..."

  default:
    name: "Buddy"
    system_prompt: >
      You are HeyBuddy, a helpful and friendly voice assistant.
      Keep your answers concise — they will be spoken aloud via text-to-speech.
    voice_id: null
    elevenlabs_voice_id: "Rachel"
    wake_word_model: null
    tts_rate: 175
    greeting: "HeyBuddy is ready. How can I help?"

# ---------------------------------------------------------------------------

wake_word:
  # Path to a custom openWakeWord .tflite or .onnx model file.
  # Set to null to use the default pre-trained models (e.g. "hey_jarvis").
  # Train your own model: https://github.com/dscripka/openWakeWord#training-new-models
  model_path: null
  # Detection threshold: 0.0–1.0 (higher = fewer false positives, lower = more sensitive)
  threshold: 0.5

speech_recognition:
  # Path to the Vosk model directory (download from https://alphacephei.com/vosk/models)
  model_path: "models/vosk-model-en-us"
  # Sample rate expected by the Vosk model (usually 16000)
  sample_rate: 16000
  # Seconds to wait for speech after the wake word before giving up
  listen_timeout: 10
  # PyAudio input device index (null = default system microphone)
  device_index: null

tts:
  # Engine: "elevenlabs" (recommended, high-quality voices) or "pyttsx3" (offline fallback)
  engine: "elevenlabs"

  # ElevenLabs settings (required when engine is "elevenlabs")
  # Get your free API key at https://elevenlabs.io/ → Profile → API Keys
  # Free tier: 10,000 characters/month ≈ 10–15 minutes of speech
  elevenlabs_api_key: "YOUR_ELEVENLABS_API_KEY"
  # Voice ID or name — browse voices at https://elevenlabs.io/voices
  # Popular voices: "Rachel", "Adam", "Antoni", "Bella", "Josh", "Arnold"
  # Each skin can override this with its own elevenlabs_voice_id key.
  elevenlabs_voice_id: "Rachel"
  # Model: "eleven_multilingual_v2" (best quality) or "eleven_turbo_v2_5" (faster)
  elevenlabs_model: "eleven_multilingual_v2"

  # pyttsx3 fallback settings (used when engine is "pyttsx3" or ElevenLabs fails)
  rate: 175       # words per minute
  volume: 1.0     # 0.0 (silent) to 1.0 (full volume)
  # pyttsx3 voice ID (null = system default).
  # Run `python -c "import pyttsx3; e=pyttsx3.init(); [print(v.id) for v in e.getProperty('voices')]"`
  # to list available voice IDs on your system.
  voice_id: null

chatbot:
  # OpenAI API key — https://platform.openai.com/api-keys
  api_key: "YOUR_OPENAI_API_KEY"
  # Model to use (e.g. "gpt-4o-mini", "gpt-4o", "gpt-3.5-turbo")
  model: "gpt-4o-mini"
  # Maximum tokens in the GPT response
  max_tokens: 256
  # System prompt that defines HeyBuddy's persona
  system_prompt: >
    You are HeyBuddy, a helpful and friendly voice assistant running on a Raspberry Pi.
    Keep your answers concise — they will be spoken aloud via text-to-speech.

google_assistant:
  # Path to the OAuth2 credentials JSON file for the Google Assistant SDK
  credentials_file: "credentials.json"
  # Device model and instance IDs from the Google Actions Console
  device_model_id: "your-device-model-id"
  device_instance_id: "your-device-instance-id"

nest_sdm:
  # Google Nest Device Access project ID
  # Follow: https://developers.google.com/nest/device-access/get-started
  project_id: "YOUR_NEST_PROJECT_ID"
  # OAuth2 credentials for the Nest SDM API
  client_id: "YOUR_GOOGLE_CLIENT_ID"
  client_secret: "YOUR_GOOGLE_CLIENT_SECRET"
  refresh_token: "YOUR_GOOGLE_REFRESH_TOKEN"

home_assistant:
  # URL of your Home Assistant instance (local network recommended)
  base_url: "http://homeassistant.local:8123"
  # Long-lived access token — Profile → Long-Lived Access Tokens in the HA UI
  token: "YOUR_HOME_ASSISTANT_TOKEN"
